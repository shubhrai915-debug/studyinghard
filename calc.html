<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Preview</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #222;
}

#calculator {
  font-family: Arial, Sans-Serif;
  background: black;
  border-radius: 10px;
  max-width: 500px;
  height: 750px;
  overflow: hidden;
}

#display {
  width: 100%;
  padding: 20px;
  font-size: 3rem;
  color: white;
  text-align: left;
  border: none;
  background: hsl(0, 0%, 10%);
  box-sizing: border-box;
}

#keys {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 25px;
}

button {
  width: 100%;
  height: 80px;
  border-radius: 10px; 
  border: none;
  background-color: gray;
  color: white;
  font-size: 2rem;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: hsl(0, 0%, 40%);
}

button:active {
  background: hsl(0, 0%, 55%);
}

.operator-btn {
  background-color: hsl(35, 100%, 55%);
}

.operator-btn:hover {
  background-color: hsl(35, 100%, 40%);
}

.operator-btn:active {
  background-color: hsl(35, 100%, 75%);
}

#back {
  background: F97316;
  width: 150px;
  height: 33px;
  border: 2px solid white;
  border-radius: 4px;
  color: white;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
}
  #back:hover {
  background: hsl(39, 100%, 40%);
}

  #back:active {
  background: hsl(39, 100%, 55%);
}

  
</style>
</head>

<body>

<div id="calculator">
  <input id="display" readonly>

  <div id="keys">
    <button onclick="appendToDisplay('+')" class="operator-btn">+</button>
    <button onclick="appendToDisplay('7')">7</button>
    <button onclick="appendToDisplay('8')">8</button>
    <button onclick="appendToDisplay('9')">9</button>

    <button onclick="appendToDisplay('-')" class="operator-btn">-</button>
    <button onclick="appendToDisplay('4')">4</button>
    <button onclick="appendToDisplay('5')">5</button>
    <button onclick="appendToDisplay('6')">6</button>

    <button onclick="appendToDisplay('*')" class="operator-btn">*</button>
    <button onclick="appendToDisplay('1')">1</button>
    <button onclick="appendToDisplay('2')">2</button>
    <button onclick="appendToDisplay('3')">3</button>

    <button onclick="appendToDisplay('/')" class="operator-btn">/</button>
    <button onclick="appendToDisplay('0')">0</button>
    <button onclick="appendToDisplay('.')">.</button>
    <button onclick="calculate()">=</button>

    <button onclick="clearDisplay()" class="operator-btn">C</button>
  </div>
</div>

  <div> <button id="preview">Preview Calc</button> </div>
</div>

  <script>
  document.getElementById("back").addEventListener("click", function () {
    window.location.href = "https://educationforever.github.io/calculator.solver/index.html";
});
  </script>

<script>
  const display = document.getElementById("display");

function appendToDisplay(input){
  display.value += input;
}

function clearDisplay(){
  display.value = "";
}

function calculate(){
  try{
    display.value = eval(display.value);
  }
  catch(error){
    display.value = "Ur a bum, Err";
  }
}
</script>

</body>
</html>
